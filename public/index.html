<!DOCTYPE html>
<html>
<head>
  <title>WAMOT Dashboard</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 20px;
      margin: 20px auto;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>💧 Water Monitoring System</h1>

<div class="card">
  <h2>TDS</h2>
  <p id="tds">--</p>
</div>

<div class="card">
  <h2>Water Level</h2>
  <p id="level">--</p>
</div>

<div class="card">
  <h2>Relay Control</h2>
  <button onclick="setRelay(true)">ON</button>
  <button onclick="setRelay(false)">OFF</button>
</div>

<script>
const SUPABASE_URL = "https://kpguizysdohumbzaypsb.supabase.co";
const ANON_KEY = "sb_publishable_h8HtAyVdVwkZorXqzj1WKQ_Es5PYy9Q";

const device_id = "device_001";

// 🔁 Fetch latest data
async function getData() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/device_data?device_id=eq.${device_id}&order=created_at.desc&limit=1`,
      {
        headers: {
          "apikey": ANON_KEY
        }
      }
    );

    const data = await res.json();

    if (data.length > 0) {
      document.getElementById("tds").innerText = data[0].tds;
      document.getElementById("level").innerText = data[0].water_level;
    }
  } catch (err) {
    console.log("Error fetching data");
  }
}

// 🔁 Relay control
async function setRelay(state) {
  await fetch(
    `${SUPABASE_URL}/rest/v1/devices?device_id=eq.${device_id}`,
    {
      method: "PATCH",
      headers: {
        "apikey": ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ relay_state: state })
    }
  );

  alert("Relay updated");
}

// 🔄 Auto refresh every 5 sec
setInterval(getData, 5000);

// Initial load
getData();
</script>

</body>
</html>

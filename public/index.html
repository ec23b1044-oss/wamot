<!DOCTYPE html>
<html>
<head>
  <title>WAMOT</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
    }

    .login-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 95%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #2563eb, #06b6d4);
      color: white;
      cursor: pointer;
    }

    .dashboard {
      display: none;
      padding: 20px;
    }

    .layout {
      display: flex;
      gap: 20px;
    }

    .left, .right {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 20px;
      flex: 1;
    }

    .right { flex: 2; }

    .card {
      margin-bottom: 20px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      text-align: center;
    }

    .status {
      padding: 6px 12px;
      border-radius: 20px;
      margin-top: 10px;
      display: inline-block;
    }

    .switch {
      position: relative;
      width: 60px;
      height: 30px;
      margin: 10px auto;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      cursor: pointer;
      background: #444;
      border-radius: 30px;
      width: 100%;
      height: 100%;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 24px;
      width: 24px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider:before {
      transform: translateX(30px);
    }

    .auto-btn {
      background: orange;
      margin-top: 10px;
    }

    canvas {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 10px;
    }

    @media(max-width:768px){
      .layout { flex-direction: column; }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="login-container" id="loginScreen">
  <div class="login-card">
    <h2>💧 WAMOT</h2>
    <input id="device_id" placeholder="Device ID">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="layout">

    <div class="left">
      <div class="card">
        <h3>TDS</h3>
        <p id="tds">--</p>
        <div id="status" class="status">--</div>
      </div>

      <div class="card">
        <h3>Water Level</h3>
        <p id="level">--</p>
      </div>

      <div class="card">
        <h3>Motor</h3>

        <label class="switch">
          <input type="checkbox" id="relaySwitch" onchange="toggleRelay()">
          <span class="slider"></span>
        </label>

        <button class="auto-btn" onclick="setAuto()">AUTO</button>
        <p id="relayState"></p>
      </div>
    </div>

    <div class="right">
      <h3>Water Level History</h3>
      <canvas id="chart"></canvas>
    </div>

  </div>
</div>

<script>
let chart;

// 🔐 LOGIN
async function login() {
  const device_id = document.getElementById("device_id").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ device_id, password })
  });

  let data;
  try {
    data = await res.json();
  } catch {
    const text = await res.text();
    console.log("SERVER ERROR:", text);
    alert("Server crashed");
    return;
  }

  if (!data.success) {
    alert("Login failed");
    return;
  }

  localStorage.setItem("token", data.token);

  document.getElementById("loginScreen").style.display="none";
  document.getElementById("dashboard").style.display="block";

  loadAll();
}

// 🔑 HEADER
function authHeader() {
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + localStorage.getItem("token")
  };
}

// 📊 LIVE DATA
async function getData() {
  const res = await fetch("/api/get-data", {
    method:"POST",
    headers: authHeader()
  });

  if (res.status === 401) return logout();

  const d = await res.json();

  document.getElementById("tds").innerText = d.tds;
  document.getElementById("level").innerText = d.water_level;

  let text="Drinkable", color="green";
  if (d.tds > 600) { text="Not Safe"; color="red"; }
  else if (d.tds > 300) { text="Moderate"; color="orange"; }

  const s = document.getElementById("status");
  s.innerText = text;
  s.style.background = color;
}

// 📈 HISTORY
async function getHistory() {
  const res = await fetch("/api/get-history", {
    method:"POST",
    headers: authHeader()
  });

  const data = await res.json();

  const labels = data.map((_,i)=>i);
  const values = data.map(d=>d.water_level);

  drawChart(labels, values);
}

// 📊 GRAPH
function drawChart(labels, values) {
  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"line",
    data:{
      labels,
      datasets:[{
        data:values,
        borderColor:"#38bdf8",
        tension:0.4
      }]
    }
  });
}

// 🔌 RELAY
async function getRelay() {
  const res = await fetch("/api/get-relay", {
    method:"POST",
    headers: authHeader()
  });

  const d = await res.json();

  document.getElementById("relayState").innerText = d.state;

  const sw = document.getElementById("relaySwitch");

  if (d.state === "AUTO") {
    sw.disabled = true;
  } else {
    sw.disabled = false;
    sw.checked = (d.state === "ON");
  }
}

async function toggleRelay() {
  const state = document.getElementById("relaySwitch").checked ? "ON":"OFF";

  await fetch("/api/set-relay", {
    method:"POST",
    headers: authHeader(),
    body: JSON.stringify({ state })
  });
}

async function setAuto() {
  await fetch("/api/set-relay", {
    method:"POST",
    headers: authHeader(),
    body: JSON.stringify({ state:"AUTO" })
  });
}

// 🔁 LOAD
function loadAll() {
  getData();
  getRelay();
  getHistory();

  setInterval(()=>{
    getData();
    getRelay();
  },5000);
}

// 🔒 LOGOUT
function logout(){
  alert("Session expired");
  localStorage.removeItem("token");
  location.reload();
}
</script>

</body>
</html>

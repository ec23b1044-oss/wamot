<!DOCTYPE html>
<html>
<head>
  <title>WAMOT</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
    }

    /* LOGIN */
    .login-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 95%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #2563eb, #06b6d4);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    /* DASHBOARD */
    .dashboard {
      display: none;
      padding: 20px;
    }

    .layout {
      display: flex;
      gap: 20px;
    }

    .left, .right {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .left { flex: 1; }
    .right { flex: 2; }

    .card {
      margin-bottom: 20px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      text-align: center;
    }

    h2 {
      margin: 0 0 10px;
      color: #38bdf8;
    }

    /* SWITCH */
    .switch-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .switch {
      position: relative;
      width: 60px;
      height: 30px;
    }

    .switch input {
      opacity: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      background-color: #374151;
      border-radius: 30px;
      top: 0; left: 0; right: 0; bottom: 0;
      transition: 0.4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 24px;
      width: 24px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.4s;
    }

    input:checked + .slider {
      background: #22c55e;
      box-shadow: 0 0 10px #22c55e;
    }

    input:checked + .slider:before {
      transform: translateX(30px);
    }

    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .mode-buttons {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .mode-buttons button {
      flex: 1;
      background: #1e293b;
    }

    canvas {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 10px;
    }

    @media (max-width: 768px) {
      .layout { flex-direction: column; }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="login-container" id="loginScreen">
  <div class="login-card">
    <h2>💧 WAMOT</h2>
    <input id="device_id" placeholder="Device ID">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Access Device</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="layout">

    <!-- LEFT -->
    <div class="left">

      <div class="card">
        <h2>TDS</h2>
        <p id="tds">--</p>
      </div>

      <div class="card">
        <h2>Water Level</h2>
        <p id="level">--</p>
      </div>

      <div class="card">
        <h2>Motor Control</h2>

        <div class="switch-container" id="switchContainer">
          <label class="switch">
            <input type="checkbox" id="relaySwitch" onchange="toggleRelay()">
            <span class="slider"></span>
          </label>
          <p id="switchLabel">OFF</p>
        </div>

        <div class="mode-buttons">
          <button onclick="setMode('MANUAL')">Manual</button>
          <button onclick="setMode('AUTO')">Auto</button>
        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="right">
      <h2>📊 Historical Data</h2>
      <canvas id="chart"></canvas>
    </div>

  </div>

</div>

<script>
let device_id = "";
let password = "";
let chart;
let currentMode = "MANUAL";

// LOGIN
async function login() {

  device_id = document.getElementById("device_id").value;
  password = document.getElementById("password").value;

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password })
  });

  const data = await res.json();

  if (!data.success) {
    alert("Invalid credentials");
    return;
  }

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  getData();
  loadHistory();
}

// LIVE DATA
async function getData() {

  const res = await fetch("/api/get-data", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id })
  });

  const data = await res.json();

  document.getElementById("tds").innerText = data.tds ?? "--";
  document.getElementById("level").innerText = data.water_level ?? "--";
}

setInterval(() => {
  if (device_id) getData();
}, 5000);

// HISTORY
async function loadHistory() {

  const res = await fetch("/api/get-history", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id })
  });

  const data = await res.json();

  const labels = data.map(d => new Date(d.created_at).toLocaleDateString());
  const values = data.map(d => d.tds);

  drawChart(labels, values);
}

function drawChart(labels, values) {

  if (chart) chart.destroy();

  const ctx = document.getElementById("chart");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "TDS",
        data: values,
        borderColor: "#38bdf8",
        tension: 0.4
      }]
    }
  });
}

// SWITCH
function toggleRelay() {
  const state = document.getElementById("relaySwitch").checked;
  document.getElementById("switchLabel").innerText = state ? "ON" : "OFF";
  setRelay(state ? "ON" : "OFF");
}

// MODE
function setMode(mode) {

  currentMode = mode;
  const switchBox = document.getElementById("switchContainer");

  if (mode === "AUTO") {
    switchBox.classList.add("disabled");
    document.getElementById("switchLabel").innerText = "AUTO";
    setRelay("AUTO");
  } else {
    switchBox.classList.remove("disabled");
  }
}

// RELAY
async function setRelay(state) {

  await fetch("/api/set-relay", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password, state })
  });
}
</script>

</body>
</html>

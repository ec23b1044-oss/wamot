<!DOCTYPE html>
<html>
<head>
  <title>WAMOT</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
    }

    /* LOGIN */
    .login-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 95%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #2563eb, #06b6d4);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    /* DASHBOARD */
    .dashboard {
      display: none;
      padding: 20px;
    }

    .layout {
      display: flex;
      gap: 20px;
    }

    .left, .right {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .left { flex: 1; }
    .right { flex: 2; }

    .card {
      margin-bottom: 20px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      text-align: center;
      box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
    }

    h2 {
      margin: 0 0 10px;
      color: #38bdf8;
    }

    /* 🔥 RELAY TOGGLE */
    .toggle-container {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .toggle {
      padding: 10px 20px;
      border-radius: 20px;
      background: #1e293b;
      cursor: pointer;
      transition: 0.3s;
    }

    .toggle.active-on {
      background: #22c55e;
      box-shadow: 0 0 15px #22c55e;
    }

    .toggle.active-off {
      background: #ef4444;
      box-shadow: 0 0 15px #ef4444;
    }

    .toggle.active-auto {
      background: #f59e0b;
      box-shadow: 0 0 15px #f59e0b;
    }

    canvas {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 10px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="login-container" id="loginScreen">
  <div class="login-card">
    <h2>💧 WAMOT</h2>
    <input id="device_id" placeholder="Device ID">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Access Device</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="layout">

    <!-- LEFT -->
    <div class="left">

      <div class="card">
        <h2>TDS</h2>
        <p id="tds">--</p>
      </div>

      <div class="card">
        <h2>Water Level</h2>
        <p id="level">--</p>
      </div>

      <div class="card">
        <h2>Motor Mode</h2>

        <div class="toggle-container">
          <div class="toggle" id="onBtn" onclick="setRelay('ON')">ON</div>
          <div class="toggle" id="offBtn" onclick="setRelay('OFF')">OFF</div>
          <div class="toggle" id="autoBtn" onclick="setRelay('AUTO')">AUTO</div>
        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="right">
      <h2>📊 Historical Data</h2>
      <canvas id="chart"></canvas>
    </div>

  </div>

</div>

<script>
const SUPABASE_URL = "https://kpguizysdohumbzaypsb.supabase.co";
const ANON_KEY = "sb_publishable_h8HtAyVdVwkZorXqzj1WKQ_Es5PYy9Q";


let device_id = "";
let password = "";
let chart;

// LOGIN
async function login() {

  device_id = document.getElementById("device_id").value;
  password = document.getElementById("password").value;

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/devices?device_id=eq.${device_id}&device_password=eq.${password}`,
    { headers: { "apikey": ANON_KEY } }
  );

  const data = await res.json();

  if (data.length === 0) {
    alert("Invalid credentials");
    return;
  }

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  getData();
  loadHistory();
}

// LIVE DATA
async function getData() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/device_data?device_id=eq.${device_id}&order=created_at.desc&limit=1`,
    { headers: { "apikey": ANON_KEY } }
  );

  const data = await res.json();

  if (data.length > 0) {
    document.getElementById("tds").innerText = data[0].tds;
    document.getElementById("level").innerText = data[0].water_level;
  }
}

setInterval(() => {
  if (device_id) getData();
}, 5000);

// HISTORY
async function loadHistory() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/device_data?device_id=eq.${device_id}&order=created_at.asc`,
    { headers: { "apikey": ANON_KEY } }
  );

  const data = await res.json();

  const labels = data.map(d => new Date(d.created_at).toLocaleDateString());
  const values = data.map(d => d.tds);

  drawChart(labels, values);
}

function drawChart(labels, values) {

  if (chart) chart.destroy();

  const ctx = document.getElementById("chart");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "TDS",
        data: values,
        borderColor: "#38bdf8",
        tension: 0.4
      }]
    }
  });
}

// RELAY
async function setRelay(state) {

  document.querySelectorAll(".toggle").forEach(t => t.classList.remove("active-on","active-off","active-auto"));

  if (state === "ON") document.getElementById("onBtn").classList.add("active-on");
  if (state === "OFF") document.getElementById("offBtn").classList.add("active-off");
  if (state === "AUTO") document.getElementById("autoBtn").classList.add("active-auto");

  await fetch(
    `${SUPABASE_URL}/rest/v1/devices?device_id=eq.${device_id}&device_password=eq.${password}`,
    {
      method: "PATCH",
      headers: {
        "apikey": ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ relay_state: state })
    }
  );
}
</script>

</body>
</html>

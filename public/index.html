<!DOCTYPE html>
<html>
<head>
  <title>Water Monitoring</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 320px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #3b8de3;
    }

    .dashboard {
      display: none;
      text-align: center;
    }

    .data-card {
      background: white;
      margin: 15px auto;
      padding: 20px;
      border-radius: 15px;
      width: 280px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    h1 {
      color: white;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <h2>💧 Device Login</h2>
    <input id="device_id" placeholder="Device ID">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">

    <h1>Water Monitor</h1>

    <div class="data-card">
      <h3>TDS</h3>
      <p id="tds">--</p>
    </div>

    <div class="data-card">
      <h3>Water Level</h3>
      <p id="level">--</p>
    </div>

    <div class="data-card">
      <h3>Relay Control</h3>
      <button onclick="setRelay(true)">Turn ON</button>
      <button onclick="setRelay(false)">Turn OFF</button>
    </div>

  </div>

</div>

<script>
const SUPABASE_URL = "https://kpguizysdohumbzaypsb.supabase.co";
const ANON_KEY = "sb_publishable_h8HtAyVdVwkZorXqzj1WKQ_Es5PYy9Q";


let device_id = "";
let password = "";

// 🔐 LOGIN
async function login() {

  device_id = document.getElementById("device_id").value;
  password = document.getElementById("password").value;

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/devices?device_id=eq.${device_id}&device_password=eq.${password}`,
    { headers: { "apikey": ANON_KEY } }
  );

  const data = await res.json();

  if (data.length === 0) {
    alert("Invalid credentials");
    return;
  }

  // ✨ Smooth transition
  document.getElementById("loginCard").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  getData();
}

// 📊 GET DATA
async function getData() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/device_data?device_id=eq.${device_id}&order=created_at.desc&limit=1`,
    { headers: { "apikey": ANON_KEY } }
  );

  const data = await res.json();

  if (data.length > 0) {
    document.getElementById("tds").innerText = data[0].tds;
    document.getElementById("level").innerText = data[0].water_level;
  }
}

// 🔁 AUTO REFRESH
setInterval(() => {
  if (device_id) getData();
}, 5000);

// 🔌 RELAY CONTROL
async function setRelay(state) {

  await fetch(
    `${SUPABASE_URL}/rest/v1/devices?device_id=eq.${device_id}&device_password=eq.${password}`,
    {
      method: "PATCH",
      headers: {
        "apikey": ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ relay_state: state })
    }
  );

}
</script>

</body>
</html>

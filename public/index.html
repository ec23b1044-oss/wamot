<!DOCTYPE html>
<html>
<head>
  <title>Water Monitoring System</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      margin-top: 50px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px auto;
      width: 280px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>💧 Water Monitoring System</h1>

<!-- 🔐 LOGIN -->
<div class="card">
  <h2>Device Login</h2>

  <input id="device_id" placeholder="Device ID"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
</div>

<!-- 📊 DASHBOARD -->
<div id="dashboard" style="display:none">

  <div class="card">
    <h2>TDS</h2>
    <p id="tds">--</p>
  </div>

  <div class="card">
    <h2>Water Level</h2>
    <p id="level">--</p>
  </div>

  <div class="card">
    <h2>Relay Control</h2>
    <button onclick="setRelay(true)">ON</button>
    <button onclick="setRelay(false)">OFF</button>
  </div>

</div>

<script>
const SUPABASE_URL = "https://kpguizysdohumbzaypsb.supabase.co";
const ANON_KEY = "sb_publishable_h8HtAyVdVwkZorXqzj1WKQ_Es5PYy9Q";

let device_id = "";
let password = "";

// 🔐 LOGIN
async function login() {

  device_id = document.getElementById("device_id").value;
  password = document.getElementById("password").value;

  if (!device_id || !password) {
    alert("Enter credentials");
    return;
  }

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/devices?device_id=eq.${device_id}&device_password=eq.${password}`,
    {
      headers: { "apikey": ANON_KEY }
    }
  );

  const data = await res.json();

  if (data.length === 0) {
    alert("Invalid device ID or password");
    return;
  }

  document.getElementById("dashboard").style.display = "block";

  getData();
}

// 📊 GET LATEST DATA (NO HISTORY)
async function getData() {

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/device_data?device_id=eq.${device_id}&order=created_at.desc&limit=1`,
      {
        headers: { "apikey": ANON_KEY }
      }
    );

    const data = await res.json();

    if (data.length > 0) {
      document.getElementById("tds").innerText = data[0].tds;
      document.getElementById("level").innerText = data[0].water_level;
    }
  } catch (err) {
    console.log("Error fetching data");
  }
}

// 🔁 AUTO REFRESH
setInterval(() => {
  if (device_id) getData();
}, 5000);

// 🔌 RELAY CONTROL
async function setRelay(state) {

  await fetch(
    `${SUPABASE_URL}/rest/v1/devices?device_id=eq.${device_id}&device_password=eq.${password}`,
    {
      method: "PATCH",
      headers: {
        "apikey": ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ relay_state: state })
    }
  );

  alert("Relay updated");
}
</script>

</body>
</html>

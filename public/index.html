<!DOCTYPE html>
<html>
<head>
  <title>WAMOT</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
    }

    /* 🔐 LOGIN SCREEN */
    .login-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .login-card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      width: 95%;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      cursor: pointer;
    }

    /* 🧠 DASHBOARD */
    .dashboard {
      display: none;
      padding: 20px;
    }

    .layout {
      display: flex;
      gap: 20px;
    }

    .left, .right {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .left {
      flex: 1;
    }

    .right {
      flex: 2;
    }
    .auto {
  background: #f59e0b;
}

.auto:hover {
  box-shadow: 0 0 15px #f59e0b;
}

    .card {
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #fafafa;
    }

    h2 {
      margin-top: 0;
    }

    /* 📱 MOBILE */
    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div class="login-container" id="loginScreen">
  <div class="login-card">
    <h2>💧 Device Login</h2>
    <input id="device_id" placeholder="Device ID">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- 🧠 DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="layout">

    <!-- LEFT SIDE -->
    <div class="left">

      <div class="card">
        <h2>Live TDS</h2>
        <p id="tds">--</p>
      </div>

      <div class="card">
        <h2>Water Level</h2>
        <p id="level">--</p>
      </div>

      <div class="card">
        <h2>Relay Control</h2>
<div class="relay-buttons">
<div class="relay-buttons">
  <button class="relay-btn on" onclick="setRelay('ON')">ON</button>
  <button class="relay-btn off" onclick="setRelay('OFF')">OFF</button>
  <button class="relay-btn auto" onclick="setRelay('AUTO')">AUTO</button>
</div>
</div>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
      <h2>📊 30-Day History</h2>
      <canvas id="chart"></canvas>
    </div>

  </div>

</div>

<script>
const SUPABASE_URL = "https://kpguizysdohumbzaypsb.supabase.co";
const ANON_KEY = "sb_publishable_h8HtAyVdVwkZorXqzj1WKQ_Es5PYy9Q";


let device_id = "";
let password = "";
let chart;

// 🔐 LOGIN
async function login() {

  device_id = document.getElementById("device_id").value;
  password = document.getElementById("password").value;

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/devices?device_id=eq.${device_id}&device_password=eq.${password}`,
    { headers: { "apikey": ANON_KEY } }
  );

  const data = await res.json();

  if (data.length === 0) {
    alert("Invalid credentials");
    return;
  }

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  getData();
  loadHistory();
}

// 📊 LIVE DATA
async function getData() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/device_data?device_id=eq.${device_id}&order=created_at.desc&limit=1`,
    { headers: { "apikey": ANON_KEY } }
  );

  const data = await res.json();

  if (data.length > 0) {
    document.getElementById("tds").innerText = data[0].tds;
    document.getElementById("level").innerText = data[0].water_level;
  }
}

// 🔁 AUTO REFRESH
setInterval(() => {
  if (device_id) getData();
}, 5000);

// 📈 LOAD HISTORY
async function loadHistory() {

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/device_data?device_id=eq.${device_id}&created_at=gte.${getPastDate()}&order=created_at.asc`,
    { headers: { "apikey": ANON_KEY } }
  );

  const data = await res.json();

  const labels = data.map(d => new Date(d.created_at).toLocaleDateString());
  const tds = data.map(d => d.tds);

  drawChart(labels, tds);
}

// 🕒 LAST 30 DAYS
function getPastDate() {
  const d = new Date();
  d.setDate(d.getDate() - 30);
  return d.toISOString();
}

// 📊 DRAW CHART
function drawChart(labels, values) {

  if (chart) chart.destroy();

  const ctx = document.getElementById("chart").getContext("2d");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "TDS",
        data: values,
        borderWidth: 2,
        fill: false
      }]
    }
  });
}

// 🔌 RELAY
async function setRelay(state) {

  await fetch(
    `${SUPABASE_URL}/rest/v1/devices?device_id=eq.${device_id}&device_password=eq.${password}`,
    {
      method: "PATCH",
      headers: {
        "apikey": ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ relay_state: state })
    }
  );

}
</script>

</body>
</html>

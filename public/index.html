<!DOCTYPE html>
<html>
<head>
  <title>IoT Dashboard</title>
</head>
<body>

<h2>Sensor Data</h2>

<p>TDS: <span id="tds">--</span></p>
<p>Water Level: <span id="level">--</span></p>

<h2>Relay Control</h2>

<button onclick="setRelay(true)">ON</button>
<button onclick="setRelay(false)">OFF</button>

<script>
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const ANON_KEY = "YOUR_ANON_KEY";

// 🔁 Fetch latest sensor data
async function getData() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/device_data?device_id=eq.device_001&order=created_at.desc&limit=1",
    {
      headers: {
        "apikey": ANON_KEY
      }
    }
  );

  const data = await res.json();

  if (data.length > 0) {
    document.getElementById("tds").innerText = data[0].tds;
    document.getElementById("level").innerText = data[0].water_level;
  }
}

// 🔁 Relay control
async function setRelay(state) {
  await fetch(
    SUPABASE_URL + "/rest/v1/devices?device_id=eq.device_001",
    {
      method: "PATCH",
      headers: {
        "apikey": ANON_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ relay_state: state })
    }
  );

  alert("Relay updated");
}

// 🔄 Auto refresh every 5 sec
setInterval(getData, 5000);

// initial load
getData();
</script>

</body>
</html>

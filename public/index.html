<!DOCTYPE html>
<html>
<head>
  <title>WAMOT</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
    }

    .login-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 95%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #2563eb, #06b6d4);
      color: white;
      cursor: pointer;
    }

    .dashboard { display: none; padding: 20px; }

    .layout { display: flex; gap: 20px; }

    .left, .right {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 20px;
      flex: 1;
    }

    .right { flex: 2; }

    .card {
      margin-bottom: 20px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.05);
      text-align: center;
    }

    h2 { color: #38bdf8; }

    /* SWITCH */
    .switch-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .switch {
      position: relative;
      width: 60px;
      height: 30px;
    }

    .switch input { opacity: 0; }

    .slider {
      position: absolute;
      background-color: #374151;
      border-radius: 30px;
      top: 0; left: 0; right: 0; bottom: 0;
      cursor: pointer;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 24px;
      width: 24px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background: #22c55e;
      box-shadow: 0 0 10px #22c55e;
    }

    input:checked + .slider:before {
      transform: translateX(30px);
    }

    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .mode-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .mode-buttons button {
      flex: 1;
      background: #1e293b;
    }

    canvas {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      .layout { flex-direction: column; }
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="login-container" id="loginScreen">
  <div class="login-card">
    <h2>💧 WAMOT</h2>
    <input id="device_id" placeholder="Device ID">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="layout">

    <!-- LEFT -->
    <div class="left">

      <div class="card">
        <h2>TDS</h2>
        <p id="tds">--</p>
      </div>

      <div class="card">
        <h2>Water Level</h2>
        <p id="level">--</p>
      </div>

      <div class="card">
        <h2>Motor</h2>

        <div id="switchContainer" class="switch-container">
          <label class="switch">
            <input type="checkbox" id="relaySwitch" onchange="toggleRelay()">
            <span class="slider"></span>
          </label>
          <p id="switchLabel">OFF</p>
        </div>

        <div class="mode-buttons">
          <button onclick="setMode('MANUAL')">Manual</button>
          <button onclick="setMode('AUTO')">Auto</button>
        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="right">
      <h2>📊 History</h2>
      <canvas id="chart"></canvas>
    </div>

  </div>
</div>

<script>
let device_id = "";
let password = "";
let chart;

// LOGIN
async function login() {

  device_id = document.getElementById("device_id").value;
  password = document.getElementById("password").value;

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password })
  });

  const data = await res.json();

  if (!data.success) return alert("Invalid login");

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  getData();
  loadHistory();
  getRelayState();
}

// LIVE DATA
async function getData() {
  const res = await fetch("/api/get-data", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id })
  });

  const data = await res.json();

  document.getElementById("tds").innerText = data.tds ?? "--";
  document.getElementById("level").innerText = data.water_level ?? "--";
}

// RELAY STATE SYNC
async function getRelayState() {
  const res = await fetch("/api/get-relay", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id })
  });

  const data = await res.json();
  updateRelayUI(data.state);
}

// UPDATE UI
function updateRelayUI(state) {
  const box = document.getElementById("switchContainer");
  const sw = document.getElementById("relaySwitch");
  const label = document.getElementById("switchLabel");

  if (state === "ON") {
    sw.checked = true;
    box.classList.remove("disabled");
    label.innerText = "ON";
  } else if (state === "OFF") {
    sw.checked = false;
    box.classList.remove("disabled");
    label.innerText = "OFF";
  } else {
    box.classList.add("disabled");
    label.innerText = "AUTO";
  }
}

// TOGGLE
function toggleRelay() {
  const state = document.getElementById("relaySwitch").checked ? "ON" : "OFF";
  document.getElementById("switchLabel").innerText = state;
  setRelay(state);
}

// MODE
function setMode(mode) {
  if (mode === "AUTO") {
    document.getElementById("switchContainer").classList.add("disabled");
    document.getElementById("switchLabel").innerText = "AUTO";
    setRelay("AUTO");
  } else {
    document.getElementById("switchContainer").classList.remove("disabled");
  }
}

// SET RELAY
async function setRelay(state) {
  await fetch("/api/set-relay", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id, password, state })
  });
}

// HISTORY
async function loadHistory() {
  const res = await fetch("/api/get-history", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ device_id })
  });

  const data = await res.json();

  const labels = data.map(d => new Date(d.created_at).toLocaleDateString());
  const values = data.map(d => d.tds);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "TDS",
        data: values,
        borderColor: "#38bdf8",
        tension: 0.4
      }]
    }
  });
}

// AUTO REFRESH
setInterval(() => {
  if (device_id) {
    getData();
    getRelayState();
  }
}, 1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>IoT Dashboard</title>
</head>
<body>

<h2>Relay Control</h2>

<button onclick="setRelay(true)">ON</button>
<button onclick="setRelay(false)">OFF</button>

<script>
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const ANON_KEY = "YOUR_ANON_KEY";

async function setRelay(state) {
  await fetch(SUPABASE_URL + "/rest/v1/devices?device_id=eq.device_001", {
    method: "PATCH",
    headers: {
      "apikey": ANON_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ relay_state: state })
  });

  alert("Relay updated");
}
</script>

</body>
</html>
